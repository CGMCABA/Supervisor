<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Centro de Monitoreo CABA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --card: #131313; --card2: #191919; --border: #1e1e1e; --border2: #252525;
  --gold: #FBBB0D; --red: #ef4444; --amber: #f59e0b; --green: #22c55e; --blue: #3b82f6;
  --fg: #f0f0f0; --muted: #888; --dim: #444;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: var(--font-body); overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }

/* HEADER */
#header {
  height: 52px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; background: var(--card); border-bottom: 1px solid var(--border); position: relative; z-index: 50;
}
.gcba-badge { background: var(--gold); color: #000; font-family: var(--font-display); font-size: 10px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; padding: 3px 9px; }
.header-title { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.25em; color: var(--gold); text-transform: uppercase; }
.header-icon { font-size: 16px; }
.clock-time { font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: var(--gold); }
.clock-date { font-size: 9px; color: #555; letter-spacing: 0.12em; text-transform: uppercase; text-align: right; }
#btn-settings { background: none; border: 1px solid var(--border2); color: #555; padding: 4px 9px; cursor: pointer; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-body); transition: all .15s; }
#btn-settings:hover { border-color: var(--gold); color: var(--gold); }
.sync-indicator { display: flex; align-items: center; gap: 6px; margin-left: 12px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; }

/* ALERT BANNER */
#alert-banner {
  display: none; flex-shrink: 0; padding: 6px 18px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; text-align: center;
  animation: alertPulse 2s ease-in-out infinite;
}
@keyframes alertPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
.alert-critical { background: rgba(239,68,68,0.15); color: var(--red); border-bottom: 1px solid rgba(239,68,68,0.3); }
.alert-warning { background: rgba(251,187,13,0.1); color: var(--gold); border-bottom: 1px solid rgba(251,187,13,0.2); }

/* STATS BAR */
#stats-bar {
  height: 72px; flex-shrink: 0; display: flex; align-items: stretch; gap: 0;
  background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto;
}
.stat-card {
  flex: 1; min-width: 160px; display: flex; align-items: center; gap: 12px;
  padding: 0 18px; border-right: 1px solid var(--border); position: relative;
}
.stat-card:last-child { border-right: none; }
.stat-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.stat-label { font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.12em; white-space: nowrap; }
.stat-val { font-size: 22px; font-weight: 900; font-family: var(--font-mono); line-height: 1; }
.stat-delta { font-size: 9px; font-weight: 700; }
.sparkline-wrap { width: 80px; height: 32px; flex-shrink: 0; margin-left: auto; }
.sparkline-wrap svg { width: 100%; height: 100%; }

/* MAIN */
#main { flex: 1; display: flex; overflow: hidden; }
#map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }
#sidebar {
  width: 320px; flex-shrink: 0; background: var(--card); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-tab-bar {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-tab {
  flex: 1; padding: 8px 0; text-align: center; font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim);
  cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; background: none; border-top: none; border-left: none; border-right: none;
}
.sidebar-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
#sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px; }
.sidebar-item {
  padding: 8px 10px; margin-bottom: 4px; border-radius: 8px; border: 1px solid var(--border);
  cursor: pointer; transition: all .15s; position: relative;
}
.sidebar-item:hover { border-color: var(--border2); background: var(--card2); }
.sidebar-item.selected { background: #222; }
.item-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 8px 0 0 8px; }
.item-source { font-size: 8px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; display: inline-block; }
.item-title { font-size: 13px; font-weight: 700; color: #e0e0e0; text-transform: uppercase; margin: 3px 0 2px; line-height: 1.15; }
.item-sub { font-size: 10px; color: #555; }
.item-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.item-badge { font-size: 8px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 1px 7px; border-radius: 999px; border: 1px solid; }
.empty-state { text-align: center; color: #333; font-size: 12px; padding: 40px 20px; }

/* MAP LABELS */
.bg-transparent { background: transparent !important; border: none !important; box-shadow: none !important; }
.leaflet-tooltip.sup-label { background: rgba(0,0,0,0.85); color: #fff; border: none; font-family: var(--font-body); font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.6); }
.leaflet-tooltip.sup-label::before { border-right-color: rgba(0,0,0,0.85); }
.leaflet-popup-content-wrapper { background: #1a1a1a; color: #eee; border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.7); border: 1px solid #333; }
.leaflet-popup-tip { background: #1a1a1a; }

/* TICKER */
#ticker { height: 28px; flex-shrink: 0; background: var(--card); border-top: 1px solid var(--border); overflow: hidden; position: relative; }
#ticker-track { display: flex; gap: 36px; align-items: center; height: 100%; white-space: nowrap; animation: tickerScroll 60s linear infinite; padding-left: 100%; }
@keyframes tickerScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.ticker-item { display: inline-flex; align-items: center; gap: 6px; }
.ticker-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.ticker-text { font-size: 10px; color: #555; font-weight: 500; }

/* MODAL */
.modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; justify-content:center; align-items:center; }
.modal-backdrop.show { display:flex; }
.modal { background:#1a1a1a; border:1px solid #333; border-radius:14px; padding:28px; width:420px; max-width:90vw; }
.modal h3 { font-size:14px; font-weight:800; color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:16px; }
.modal label { font-size:10px; color:#666; text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:4px; margin-top:12px; }
.modal input { width:100%; background:#111; border:1px solid #333; color:#ddd; padding:8px 10px; border-radius:6px; font-size:12px; font-family:var(--font-mono); }
.modal-actions { display:flex; gap:8px; margin-top:18px; }
.modal-actions button { flex:1; padding:8px; border:none; border-radius:8px; font-size:11px; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:0.08em; }
.btn-gold { background:var(--gold); color:#000; }
.btn-dim { background:#222; color:#888; border:1px solid #333 !important; }

/* LOADING */
#loading-overlay { position:fixed; inset:0; background:var(--bg); z-index:300; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
.loading-spinner { width:32px; height:32px; border:3px solid #222; border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:11px; color:#444; letter-spacing:0.15em; text-transform:uppercase; }
</style>
</head>
<body>
<div id="app">
  <!-- LOADING -->
  <div id="loading-overlay"><div class="loading-spinner"></div><div class="loading-text">Cargando datos...</div></div>

  <!-- HEADER -->
  <header id="header">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="gcba-badge">GCBA</span>
      <span style="font-size:9px;color:#333;letter-spacing:0.15em;text-transform:uppercase">Centro de Monitoreo</span>
    </div>
    <div class="header-title">
  <span class="header-icon">🛡️</span>
  <span id="tab-home" style="cursor:pointer">Vista Supervisor</span>
  <span style="opacity:.3;margin:0 6px">|</span>
  <span id="tab-analisis" style="cursor:pointer">Análisis</span>
</div>
    <div style="display:flex;align-items:center;gap:14px">
      <div class="sync-indicator">
        <span class="sync-dot" id="sync-dot" style="background:#333"></span>
        <span id="sync-label" style="font-size:8px;color:#333;letter-spacing:0.1em;text-transform:uppercase">—</span>
      </div>
      <div style="text-align:right">
        <div class="clock-time" id="clock">--:--</div>
        <div class="clock-date" id="clock-date"></div>
      </div>
      <button id="btn-settings" onclick="openModal()">⚙ Fuentes</button>
    </div>
  </header>

  <!-- ALERT BANNER -->
  <div id="alert-banner"></div>

  <!-- STATS BAR -->
  <div id="stats-bar">
    <div class="stat-card">
      <div class="stat-info">
        <span class="stat-label">Sucesos activos</span>
        <span class="stat-val" id="st-sucesos" style="color:var(--amber)">0</span>
        <span class="stat-delta" id="st-sucesos-delta"></span>
      </div>
      <div class="sparkline-wrap" id="spark-sucesos"></div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <span class="stat-label">Semáforos fallados</span>
        <span class="stat-val" id="st-semaforos" style="color:var(--red)">0</span>
        <span class="stat-delta" id="st-semaforos-delta"></span>
      </div>
      <div class="sparkline-wrap" id="spark-semaforos"></div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <span class="stat-label">Críticos total</span>
        <span class="stat-val" id="st-criticos" style="color:var(--red)">0</span>
        <span class="stat-delta" id="st-criticos-delta"></span>
      </div>
      <div class="sparkline-wrap" id="spark-criticos"></div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <span class="stat-label">Sin cobertura</span>
        <span class="stat-val" id="st-sincobertura" style="color:#666">0</span>
      </div>
      <div class="sparkline-wrap" id="spark-sincobertura"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="map-container">
      <div id="map"></div>
      <div style="position:absolute;top:10px;left:10px;z-index:400;display:flex;gap:6px">
        <div style="background:rgba(0,0,0,.8);border:1px solid #333;border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--amber)"></span>
          <span style="font-size:9px;color:#aaa;letter-spacing:0.06em">Sucesos</span>
        </div>
        <div style="background:rgba(0,0,0,.8);border:1px solid #333;border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--red)"></span>
          <span style="font-size:9px;color:#aaa;letter-spacing:0.06em">Semáforos</span>
        </div>
      </div>
    </div>
    <div id="sidebar">
      <div class="sidebar-tab-bar">
        <button class="sidebar-tab active" data-tab="todos" onclick="switchTab('todos')">Todos</button>
        <button class="sidebar-tab" data-tab="sucesos" onclick="switchTab('sucesos')">Sucesos</button>
        <button class="sidebar-tab" data-tab="semaforos" onclick="switchTab('semaforos')">Semáforos</button>
      </div>
      <div id="sidebar-scroll"><div class="empty-state">Cargando datos...</div></div>
    </div>
  </div>

  
<div id="analysis-view" style="display:none;width:100%;height:100%;background:#0d0d0d;padding:20px;overflow:auto;">
  <h2 style="color:#FBBB0D">Análisis Operativo</h2>
  <div style="display:flex;gap:20px;flex-wrap:wrap">
    <div style="background:#131313;padding:15px;border:1px solid #222;border-radius:10px">
      <div style="font-size:11px;color:#666">Evolución</div>
      <canvas id="chart-trend" width="300" height="150"></canvas>
    </div>
    <div style="background:#131313;padding:15px;border:1px solid #222;border-radius:10px">
      <div style="font-size:11px;color:#666">Criticidad</div>
      <canvas id="chart-crit" width="300" height="150"></canvas>
    </div>
  </div>
</div>
